body:
  text: 產後總論凡病皆起於氣血之衰脾胃之弱而產後為尤甚是以丹溪論產必當大補氣血為先雖有他症以末治之此言已盡醫產大旨若能擴充立方則治產思過半矣夫產後症變百出不可以常病之藥一概論治如有氣勿專疏散有食勿專消導熱不可妄用芩連寒不可多用桂附至若虛中外感見三陽表症之多似可汗也在產後而用麻黃則重竭其陽見三陰里症之多似可下也在產後而用承氣則重亡其陰耳聾脅痛乃腎虛惡露之停休用柴胡譫語汗出乃元弱似邪之症毋同胃實厥由陽氣之衰難分寒熱非大補不能回陽而起弱痙由陰血之虧毋論剛柔非滋榮不能舒筋而活絡又如乍寒乍熱發作有期症類瘧也若以瘧治遷延難愈神不守舍言語無倫病似邪也若同邪論危殆可虞去血多而大便燥結蓯蓉加於生化非潤腸承氣之能通患汗多而小便短澀生脈倍用參耆必生津助液之可利加參生化頻服救產後之危六和調胃並行蘇絕谷之厄頹產脫肛多是氣虛下陷宜補中益氣之方拳攣口噤乃是血燥類風當加參生化之劑產戶入風而痛甚宜服羌活養榮湯玉門傷冷而不閉洗用茱硫合蛇菟吳茱萸硫黃蛇床子菟絲子各五錢煎湯熏洗怔忡驚悸生化加以遠志似邪恍惚安神佐以歸脾因氣而滿悶虛煩生化加木香為佐因食而噯酸惡食六君加神麯為良蘇木稜蓬最能破血用之必殆青皮枳實大能耗氣服之非宜凡一應破血耗氣之品汗吐宣下之劑只可施於少壯豈宜用於產危大抵生產之後先問惡露如何塊痛未除不可遽加參朮腹中痛止補中益氣為良至若亡陽脫汗氣虛喘促頻灌生化加參是從權也亡陰大熱血崩昏厥速煎生化原方乃救急也凡此治法先為提綱庶使開卷瞭然不至茫無頭緒則未必無小補云生化湯川芎一錢二分當歸五錢乾薑炙黑五分甘草炙三分桃仁去皮尖研十一粒上藥用水一盞陳酒半盞煎作一盞稍熱服生化者因藥性功用而立名也夫產後宿血當消新血當生若專消則新血不生專生則宿血反滯考諸藥性川芎當歸桃仁三品善治宿血專生新血佐以黑姜甘草引三品入於肝脾生血理氣莫善於此所謂行中有補化中有生實產後聖藥也凡懷孕至八九月預備二三劑至胞衣破時速煎一劑俟兒分身即速服之不問正產半產雖少壯產婦平安無恙者亦宜服二三劑則惡自消而新自生第須初產一二時辰之內未進飲食之先相繼煎服以惡露在下焦故服多而頻使惡易化而新易生庶免血暈之惡若胎前素弱及產後勞倦又當多服二劑以防昏倦若照常每日一服豈能救將危絕之氣血乎至虛人見危症及熱疾墮胎或勞甚身熱頭痛服藥四五劑雖覺稍安塊痛未除仍當服之胞衣不下有由產母才送兒出無力送衣者有歷時既久或乘冷氣則血道凝澀而衣不下者有胎前素弱至血枯而衣停者凡此當急進生化湯一二劑兼服益母膏次服鹿角灰則血旺腹和而衣自下世每以濟坤丹又名回生丹專攻血塊落胞胎雖見速效而其元氣未免受傷慎之慎之制益母膏法端午後小暑前取鮮益母草用銅鍋熬膏貯瓷瓶內勿令泄氣臨用以生化湯調服神效凡兒下而衣不下產婦不可睡倒必須先斷臍帶用草鞋墜之如寒月扶產婦至床倚人坐蓋被以火籠置被中再以綿衣烘熱替換暖腹胞下後防虛必須連服生化湯二三劑不可厭藥之頻自有大效塊痛產後腹有血塊是胎前余血之所積也夫婦人以經脈為主二七而天癸至三旬一見以象月盈則虧行之有常名之曰經有孕則經不行其餘血注於胞中以護元一月曰始胚二月曰始膏三月成形而名胎方受母血之蔭胎形尚小食母血故有留余並前兩月之血積於胞中久而成塊至產時隨兒當下亦有因產婦送兒勞倦調護欠溫以致塊痛不散者慎勿輕用攻血峻藥宜飲姜艾酒多服生化湯加以熱衣暖腹自然漸散俗師有用紅花生地以行之蘇木牛膝以攻之鮮有不至危亡者小腹有塊作痛名曰兒枕世多專先消散然後議補或消補兼施更為夾雜殊不知舊血須當消化新血尤當滋生若專主攻舊新亦不能生矣產後血氣暴虛理當大補當惡露未淨用補須知無滯血攻塊不致損元氣行中兼補方是萬全世以四物湯理產誤人多矣地黃性寒滯血芍藥酸寒伐肝治產者察之產後七日內未曾服生化湯塊痛未除仍以生化湯治之暑月產後內服生化湯以除塊痛外用熱衣暖腹方能消惡止痛若失於蓋暖亦難取效產後一二日內塊痛未止忽脫暈汗多而厥口氣漸冷即於生化湯中加用人參黃耆以扶危急日夜頻服三四劑必效產後七日內因食冷物血塊凝結痛甚宜於生化湯內加肉桂五七分產後三四日內服生化湯三四劑塊痛未減得按揉而稍安者虛也可加參二三錢產後三日內血塊痛人參當緩如遇危症從權加參救急可也病勢一轉則當減參只服本方自能取效血崩血暈血崩宜審血色之紅紫形色之虛實如血紫有塊宜去其敗血若留之反作痛不可以崩論如鮮紅之血大來乃是心因驚傷不能生血肝因怒傷不能藏血脾因勞傷不能統血當以崩治之宜於生化湯中加荊芥穗五分連服幾劑則行中有補而血安矣若形脫氣促或有汗暈厥牙關緊閉昏亂將絕先用韭菜數十莖細切放酒壺內以滾醋一碗泡入將大口塞住以小口對鼻孔熏之速煎生化奪命湯灌救如氣欲絕藥不能入即將鵝毛管插口內用酒杯盛三四分灌之如灌下腹漸溫暖連服數劑可活再用綿衣烘熱替換揉腹方無他患如產後半月崩來又宜滋榮益氣湯以升舉之世醫治崩每以棕灰止之此治末之法即有偶效禍不旋踵慎之生化奪命湯川芎二錢當歸四錢乾薑炙黑五分甘草炙三分桃仁去皮尖研十一粒肉桂三分服二劑去此味上藥加黑棗一枚用水一盞半煎七分稍熱服汗多加人參二錢生黃耆二錢兩手脈伏或右手脈絕加麥冬一錢五味子十粒如灌藥得蘇其塊痛未除當減去參耆只服生化湯除塊定痛若塊痛已除仍加參耆口渴加麥冬腹瀉加茯苓有痰加竹瀝一匙薑汁半匙若胃中久不納食聞藥氣即嘔先用人參一二錢煎湯調飯鍋焦末服之以通胃氣此等危症一日內須服二三劑方保無虞滋榮益氣湯川芎一錢當歸二錢人參二錢黃耆生用二錢生地二錢於朮二錢麥冬一錢陳皮五分升麻四分防風三分白芷四分甘草炙四分荊芥穗四分上藥加黑棗一枚用水一盞半煎七分稍熱服汗多加麻黃根麻黃髮汗根止汗宜用根五分浮小麥一撮大便不通加肉蓯蓉二錢氣不舒展加木香一錢有痰加竹瀝一匙薑汁半匙咳嗽加苦杏仁二錢驚悸加炒酸棗仁一錢柏子仁一錢傷食加神麯一錢炒麥芽一錢傷肉食加炒山楂一錢砂仁八分眼黑頭眩昏迷不省人事即是血暈其因有三一因勞倦甚而氣竭神昏二因血大脫而氣欲絕三因痰火乘虛泛上而神不清患此三者急服生化湯以行塊定痛化舊生新斯血遂生而氣轉清頻服數劑治其昏亂氣血即定矣外用前韭醋熏鼻之法治之切勿認為惡血上衝昏迷心竅以致輕用散血之劑亦勿認為痰火而用消耗之品庶無貽患血暈形色俱脫服生化奪命湯倍加人參萬勿疑為太補以致遷延不救如痰火乘虛泛上而暈於生化湯中加橘紅四分甚虛亦加人參二錢肥人多痰加竹瀝一匙薑汁半匙暈症切勿用蘇木破血等藥若血塊痛甚以生化湯調益母膏或送鹿角灰或送延胡索散俱效延胡索散延胡索一錢肉桂六分上藥用生化湯調服兒已產下燒鐵秤錘令紅投醋盆中使產婦聞醋氣可免血暈之患手足厥冷產時用力過多勞倦傷脾孤臟不能自主故手足逆冷而厥氣上行經云陽氣衰於下則為寒厥是也非大補不能回陽豈是芎歸數錢照常一日一服而能扶將絕之氣血耶必於生化湯中倍加人參一晝夜服二三劑使藥氣接續不斷則氣血旺而精神復厥症自止矣若服藥而口渴另用生脈散以代茶助津以救臟燥也或四肢逆冷瀉痢有類傷寒陰症仍服生化湯倍加人參酌加附子四五分生黃耆二錢則可回陽止逆經云厥氣上行滿脈去形謂逆氣上行滿於經絡則神氣漸散矣大抵手足厥冷由於氣血並竭神將離而機欲息僅此呼吸一線之留設非大劑參耆斷難倚仗此數十年經驗之論非敢憑虛臆造以誤人也生脈散人參一錢麥冬一錢五味子十粒上藥用水七分盞煎四分熱服類傷寒產後發熱惡寒頭痛勿誤為太陽症寒熱往來胸滿脅痛勿誤為少陽症凡此皆因氣血兩虛陰陽不和有類外感而實非外感也即或偶冒風寒亦當以末治之夫以脫血之後而有發熱惡寒頭疼脅痛等症設投以散劑重發其汗則病未消而元氣已消其害可勝言哉仲景云亡血家慎勿發汗丹溪云產後萬不可表斯言盡之矣況生化湯有芎姜二味亦寓發散之義就本方照後量加之法速服數劑諸症自除生化湯量加法感冒風寒加防風四分不應加連須蔥頭兩個嘔吐加藿香三分生薑二錢汗多氣短加人參二錢汗出微喘亦加人參二錢煩渴加麥冬一錢五味子十粒有痰加橘紅四分傷食加神麯一錢傷肉食加山楂一錢砂仁末六分潮熱自汗譫語便閉勿認為陽明症口燥舌乾咽痛勿認為少陰症夫產後潮熱自汗譫語悉屬陽虛與陽明症之熱邪入腑迥異口燥舌乾咽痛多由血竭與少陰症之熱邪鑠腎懸殊至於便閉並非熱邪結聚胃中致有燥屎豈可妄議攻下蓋產後勞倦傷脾運化為難兼之津液內竭十九患此並宜服養正通幽湯以潤之保無他患養正通幽湯川芎二錢當歸六錢甘草炙五分人參一錢黃耆生二錢陳皮一錢桃仁去皮尖研十一粒黑芝麻炒研二錢肉蓯蓉酒洗一錢上藥用水二盞煎七分稍熱服汗多加麻黃根麻黃髮汗根止汗宜用根五分口燥加麥冬一錢腹滿咽乾便結加枳殼六分汗多譫語便實加茯神二錢炒酸棗仁一錢柏子仁一錢生白朮二錢類中風氣血暴竭肢體無以濡養忽然牙關緊閉筋脈拘攣兩手搐搦有類中風或虛火上泛有痰切勿誤用治風消痰之劑以重其虛當以滋榮活絡湯治之滋榮活絡湯川芎二錢當歸三錢甘草炙五分人參一錢黃耆生二錢麥冬一錢茯苓二錢天麻一錢荊芥四分防風五分橘紅五分上藥用水二盞煎七分稍熱服汗多加麻黃根麻黃髮汗根止汗宜用根五分驚悸加炒酸棗仁二錢大便不通加肉蓯蓉二錢有痰加薑製半夏一錢竹瀝一匙薑汁半匙傷食加神麯一錢類瘧產後半月內外寒熱往來其發有期有類瘧症此由氣血兩竭陽虛寒作而陰虛發熱也惟調其氣補其血則寒熱自除慎勿用柴胡以發表芩連梔柏以退熱多致危殆不救當以人參養胃湯參朮膏日夜間服人參養胃湯人參一錢黃耆生二錢白朮生二錢當歸二錢半夏薑製一錢青皮四分茯苓一錢五分藿香五分烏梅一枚上藥用水一盞半煎七分熱服參朮膏人參五錢白朮生八兩上藥用沙鍋盛水煎三次取汁熬膏每日早晚以一小鐘開水調服妄言妄見心藏神肝藏魂心有血而神存肝得血而能視產後氣血暴虛神魂無所依倚以致言語無倫而目多妄見萬弗認為鬼邪信用符水往往不救如塊痛未除先服安神湯塊痛已除急須服補元湯以培養氣血自獲全效此一定法也生化安神湯川芎二錢當歸四錢乾薑炙黑五分甘草炙三分茯神二錢棗仁炒一錢桃仁去皮尖研十一粒上藥加黑棗二枚用水二盞煎七分熱服生化補元湯川芎一錢當歸三錢乾薑炙黑四分甘草炙四分人參二錢黃耆生二錢於朮生二錢茯神二錢棗仁炒一錢橘紅三分桃仁去皮尖研七粒上藥加蓮子十粒黑棗二枚用水二盞煎七分食遠熱服汗多加麻黃根