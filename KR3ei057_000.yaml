穢邪慮元氣之虛弱欲滋補氣血恐積滯之留連余於此症斟酌數四只有服生化湯去黑姜加木香四分方能並行不悖服二三劑不應接服香連生化湯應手可愈惟產婦體氣素厚已及一月可用推蕩之法若體氣素弱雖產月餘難議攻下如檳榔枳實厚朴大黃之屬用之產後鮮有不成敗症者可不謹歟香連生化湯川芎一錢五分當歸三錢赤芍酒炒一錢茯苓一錢木香三分黃連薑汁炒四分甘草炙四分枳殼五分陳皮三分上藥用水一盞煎五分空心服煩悶煩為虛煩悶為滿悶虛煩者血液耗散心神不守宜猛進獨參湯滿悶者胸膈鬱滯惡露攻心宜生化湯用水磨木香二分沖服虛甚加參此二症設誤用枳殼香附烏藥峻烈之品則元氣蝕損而病轉加劇產後調護法產畢須閉目稍坐然後上床以被褥靠之暑月以席捲數枕靠之若自己把持不住令老練女人靠之不可即時睡倒常以手從心至臍隨意按摩俾惡露下行房中安放醋盆以燒紅烈炭焠之以防血暈腹上用小衣烘熱替換溫之雖暑月不可僅蓋單被毋令腹寒而血塊作痛冬末春初天氣嚴寒宜閉密產室緊塞隙孔四圍置火常令暖氣和融以免他患但不宜薰香走泄真氣才產不宜食物即服生化湯二三劑飢甚先服白米湯一盞次食白粥十日內食物宜淡切忌飲冷半月後方可食雞子亦須打開煮之以防脾虛難化滿月食豬羊肉亦須撙節酒雖活血然氣性剽悍亦不宜多七日內不宜梳洗尤忌濯足惟恐招風受濕疾病蜂起晝夜令人陪侍毋致虛驚變症百出言語宜慎勿以多言耗散元氣勿以愛憎輒生惱悶以中氣餒弱二者均能致病
