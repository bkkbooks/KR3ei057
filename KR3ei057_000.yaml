front:
  text: 序人之所以生氣血而已血之所以生氣而已氣火也血水也貯水於釜厝火而烹之其蒸蒸然浮動者水也其所以然者非水也氣也火之用也故治血必先理氣氣行血行氣滯血滯行則生滯則死見血之滯而攻之使下是猶見水之滯而激之使行也今之業產科者操此術以殺人蓋不知其幾矣嘉慶癸酉余室人衛氏產後患瘀滯醫曰是非逐以莪朮荊三稜不可一劑而神昏譫語則云藥輕不勝病益以大劑而氣上逆暴脫矣余是時初未知醫以為證固不治但有悼痛厥後稍稍習岐黃家言得浦江倪氏所著產寶讀之遇戚鄙中有患此者照是書於生化湯中加生耆一二兩恆獲十全他證按方取治靡不愈然後知前此為醫所誤凡莪朮荊三稜之屬破血而因以蝕氣氣蝕則血無以生雖神奇亦化為臭腐而生化湯於行血中理氣增以生耆氣壯而血以行以生故能奏效若此也余既悼逝者之不可作復憫醫之庸頃承乏平度聽斷之暇因取是書略加刪潤鏤板傳布俾業產科者有所據依毋徒以破血蝕氣之藥殺人也嗟乎是豈獨產後然哉四明高鼓峰論治血證以固元湯先回其氣湯中重用參耆而今世粗工惟知用寒涼直折重遏其心肺之陽馴致生生之氣絕而不可復救豈不悲哉附著弁言為世之治血而不知理氣者告焉倪氏名枝維字佩玉號鳳賓雍正六年成是書向無刊本余友趙文學魏寄視寫本棄之篋衍二十五年矣生平所見治產諸書未有出此上者洵可寶也道光壬寅春仲海昌許槤序於平度州署之行吾素齋序治產方書夥矣類皆見證治證不審本原間有一二善本而博引繁徵紛然雜出讀其書者奚所折衷也夫產後勞倦異常腠理不密脾胃恆弱氣血多虧急宜滋補以回其元而他證概從末治其需補而不遽補者特以惡露未淨收固升提之品礙難驟進耳若痛塊既除調理失當則正氣久衰變證百出害將不可勝言世醫不明此旨或因煩熱而妄用清涼或因瘀滯而誤施攻下或因外感而謬加表散或因內結而專主消耗治其標而舍其本究之本愈虧而標亦不可治其不危者幾希矣道光丙午家君光祿公宦京師得許珊林刺史所刊倪氏產寶讀之竊嘆為濟人寶筏欲付梓以公於世久矣歸里後值赭亂滋擾練兵籌餉昕夕不遑致稽壽棗今先君棄養三年矣偶理遺篋睹是書重為黯然爰悉心校正付剞劂氏以承先志吾知流傳日廣必有同志之士什襲珍藏相繼刊布者由此家置一編宇字內共慶達生是則予之厚望也夫同治辛未秋仲石陽黃祖經序於三余家塾序余家得是書曾鐫印萬數千本以廣其傳數十年來戚友鄉里中按方施治靡不奏效年遠者不能記憶若近事之奇驗者可略舉一二焉余宦浙侄寶芝宦金陵光緒甲午寶芝以同知權鹽城縣篆遣眷屬來杭其側室楊氏體質素強夏月生子極速繃兒甫畢即出房料理他務僉止之入室後又以冷水浣手推窗揮扇當風而坐復止之日晡忽發寒熱眩暈僉云強壯如此冒風貪涼如此是因產後腠理不密護衛失宜致受外感也余竊疑之診其脈有虛象進以養正通幽湯一服而證減再服則全瘳矣甲辰秋余孫媳生子產後三日患痰閉搐搦之證此血虛生風也以滋榮活絡湯加半夏竹瀝薑汁進之應手而愈蓋產婦當忍痛用力之時出汗多則亡陽陽虛故畏寒失血多則傷陰陰虛故發熱氣血兩虧則神散而有眩暈甚至痰閉搐搦狀類中風自應用扶正之品以調和營衛設使目為客邪任意表散鮮有不由虛弱而成危殆者也丙午夏偶談及此笏堂太守欣然以石印是編為任囑余補記於簡端因振筆書之黃子畬謹識序慨自仲景越人而後秘典弗著至道無聞流遷以迄於今風氣日趨於下醫學之不明也久矣黃子畬觀察宦浙三十年公餘之暇博覽群書於靈樞素問之奧旨千金肘後之奇方尤為研究靡遺深有心得每聆其論說覺疑義與晰不煩言而自解今歲夏與二三知己談及產科極稱賞倪氏產寶一書並述其神效歷歷如繪余索書讀之言近而旨遠詞簡而義賅蓋融貫諸家之說崇正以闢謬由博而求精惟能握要探原是以泛應曲當也趙忠獻謂半部論語可治天下良以得其綱領斯事無不治耳政術有然醫術亦何嘗不然方今醫道失傳流品日雜庸手誤人滔滔皆是於此而欲治產者合乎準繩生產者安於衽席非以是編救正之不為功爰借原本手錄成帙用西法石印公諸同好至於論證立方各有妙義前序已闡發其蘊無俟鄙人贅述也光緒丙午夏高尚縉序於拳石山房
